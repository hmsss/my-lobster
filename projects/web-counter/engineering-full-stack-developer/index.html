<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计数器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .counter-app {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 360px;
        }
        .title {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }
        .counter-display {
            font-size: 6rem;
            font-weight: 200;
            color: #333;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
            transition: color 0.2s, transform 0.1s;
        }
        .counter-display.warning {
            color: #f44336;
        }
        .counter-display.pulse {
            transform: scale(1.05);
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-minus {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        .btn-plus {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }
        .btn-reset {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }
        .btn:hover {
            filter: brightness(1.1);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .step-setting {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .step-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .step-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        .limit-setting {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #999;
        }
        .limit-input {
            width: 60px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }
        .limit-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .history {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .history-title {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 10px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .history-item {
            padding: 4px 10px;
            background: #f5f5f5;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #666;
        }
        .history-item.plus { color: #4ecdc4; }
        .history-item.minus { color: #ff6b6b; }
    </style>
</head>
<body>
    <div id="app">
        <div class="counter-app">
            <div class="title">计数器</div>
            
            <div class="counter-display" :class="{warning: isAtLimit, pulse: isPulsing}">
                {{ count }}
            </div>
            
            <div class="controls">
                <button class="btn btn-minus" @click="decrease" :disabled="!canDecrease">➖</button>
                <button class="btn btn-reset" @click="reset">🔄</button>
                <button class="btn btn-plus" @click="increase" :disabled="!canIncrease">➕</button>
            </div>
            
            <div class="step-setting">
                <button v-for="s in steps" :key="s" class="step-btn" :class="{active: step === s}" @click="step = s">
                    {{ s }}
                </button>
            </div>
            
            <div class="limit-setting">
                <span>最小值</span>
                <input type="number" class="limit-input" v-model.number="min" @change="clampCount">
                <span>最大值</span>
                <input type="number" class="limit-input" v-model.number="max" @change="clampCount">
            </div>
            
            <div class="history" v-if="history.length > 0">
                <div class="history-title">历史记录</div>
                <div class="history-list">
                    <span v-for="(h, i) in history.slice(-10)" :key="i" class="history-item" :class="h.type">
                        {{ h.type === 'plus' ? '+' : '-' }}{{ h.value }}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, watch } = Vue;
        
        createApp({
            setup() {
                const count = ref(0);
                const step = ref(1);
                const steps = [1, 5, 10];
                const min = ref(-100);
                const max = ref(100);
                const history = ref([]);
                const isPulsing = ref(false);
                
                const canIncrease = computed(() => count.value + step.value <= max.value);
                const canDecrease = computed(() => count.value - step.value >= min.value);
                const isAtLimit = computed(() => count.value === max.value || count.value === min.value);
                
                function increase() {
                    if (!canIncrease.value) return;
                    count.value += step.value;
                    history.value.push({ type: 'plus', value: step.value });
                    triggerPulse();
                }
                
                function decrease() {
                    if (!canDecrease.value) return;
                    count.value -= step.value;
                    history.value.push({ type: 'minus', value: step.value });
                    triggerPulse();
                }
                
                function reset() {
                    count.value = 0;
                    history.value = [];
                }
                
                function clampCount() {
                    if (count.value < min.value) count.value = min.value;
                    if (count.value > max.value) count.value = max.value;
                }
                
                function triggerPulse() {
                    isPulsing.value = true;
                    setTimeout(() => { isPulsing.value = false; }, 100);
                }
                
                return { count, step, steps, min, max, history, canIncrease, canDecrease, isAtLimit, isPulsing, increase, decrease, reset, clampCount };
            }
        }).mount('#app');
    </script>
</body>
</html>
